name: Build Mac Executable

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  APP_NAME: ESC Auto
  ZIP_PREFIX: esc-auto

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: main
        run: pytest

  build-mac:
    needs: tests
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onedir --windowed --add-data "images/esc-logo.png:images" --name "$APP_NAME" --icon images/icon.icns main/run.py

      - name: Read version
        id: version
        run: |
          version=$(python -c "from pathlib import Path; import re; text = Path('main/gui_app.py').read_text(); match = re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', text); print(match.group(1) if match else '')")
          if [ -z "$version" ]; then
            echo "Could not find __version__ in main/gui_app.py" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create zip archive
        run: |
          zip_name="${ZIP_PREFIX}-${{ steps.version.outputs.version }}.zip"
          ditto -c -k --keepParent "dist/$APP_NAME.app" "$zip_name"

      - name: Upload mac executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_PREFIX }}-${{ steps.version.outputs.version }}
          path: ${{ env.ZIP_PREFIX }}-${{ steps.version.outputs.version }}.zip
          retention-days: 30
